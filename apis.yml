aid: shippingbo
name: Shippingbo
description: >-
  Shippingbo is a Toulouse, France-based e-commerce logistics SaaS founded in
  2016 by Marc Hericher and Romain Parent. The platform unifies an Order
  Management System (OMS), Warehouse Management System (WMS), and Transport
  Management System (TMS) behind a single REST API so that merchants, DNVBs,
  3PLs, wholesalers, manufacturers, and marketplaces can centralize
  multi-channel orders, pilot warehouse picking and packing, and execute
  multi-carrier shipments from one back office. Shippingbo claims 5,000+
  active users, 80 million orders, and EUR 5 billion in merchandise handled
  in 2024, with 2,500+ warehouses equipped across France and Europe.
  The Shippingbo Developer Portal (powered by Stoplight) exposes a public
  REST/JSON API covering orders, products, stocks, shipments, customers,
  pickings, and source connectors, secured by OAuth 2.0 through the
  oauth.shippingbo.com authorization server. Shippingbo additionally offers
  a dedicated TMS API for multi-carrier label generation and a webhook
  channel for order state changes, stock changes, and shipment events.
  Reported developer-facing scale includes 500+ developers, 10+ million
  orders processed through the APIs, 500+ million webhook deliveries, and
  40+ pre-integrated carriers. Shippingbo is a French Tech company backed
  by IRDI Capital Investissement and GSO Innovation.
