  - aid: shippingbo:shippingbo-tms-api
    name: Shippingbo TMS API
    description: >-
      Dedicated Transport Management System API for multi-carrier shipment
      execution. Supports carrier selection rules, label generation,
      tracking, and post-shipment customer notifications across 40+
      pre-integrated French and European carriers. Can be used standalone
      to plug Shippingbo's TMS behind an existing OMS/WMS or as the
      transport layer inside the full Shippingbo platform.
