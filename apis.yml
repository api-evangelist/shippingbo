apis:
  - aid: shippingbo:shippingbo-api
    name: Shippingbo API
    description: >-
      Shippingbo's primary REST/JSON API for managing the full e-commerce
      logistics lifecycle: orders, order items, products, stocks, customers,
      shipments, sources, and warehouse pickings. Documentation is hosted on
      Stoplight at developer.shippingbo.com and the API is secured by OAuth
      2.0 with access tokens issued by oauth.shippingbo.com. The API
      supports webhooks so client systems can react to order-state and
      stock changes without polling.
    humanURL: https://developer.shippingbo.com/docs/api/i15i5zn8ewpo0-introduction
